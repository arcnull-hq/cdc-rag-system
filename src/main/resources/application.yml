spring:
  application:
    name: cdc-rag-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cdcrag}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  ai:
    openai:
      # Provide via environment — never commit a real key.
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        # Let Spring AI create/manage the vector table on startup.
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        # Must match the embedding model's output dimension.
        dimensions: 1536

server:
  port: ${PORT:8080}
